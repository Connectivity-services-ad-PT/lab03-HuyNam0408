name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Run Mock Servers and Newman Tests Concurrently
        run: |
          npx concurrently --success first --kill-others \
            "npx prism mock contracts/iot-ingestion.yaml -p 4010" \
            "npx prism mock contracts/ai-vision.yaml -p 4011" \
            "npx wait-on http://localhost:4010/health http://localhost:4011/health && npm run test:mock"

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/